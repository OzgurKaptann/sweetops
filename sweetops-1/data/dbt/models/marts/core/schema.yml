version: 2

models:
  - name: fact_orders
    description: 1 row per order
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: current_status
        tests:
          - not_null

  - name: fact_order_items
    description: 1 row per order item
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null

  - name: fact_order_ingredients
    description: 1 row per order item ingredient selection
    columns:
      - name: order_item_ingredient_id
        tests:
          - unique
          - not_null
