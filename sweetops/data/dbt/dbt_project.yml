name: 'sweetops_analytics'
version: '1.0.0'
config-version: 2
profile: 'dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  sweetops_analytics:
    staging:
      +materialized: view
    marts:
      core:
        +materialized: table
      owner:
        +materialized: table
      forecast:
        +materialized: table
